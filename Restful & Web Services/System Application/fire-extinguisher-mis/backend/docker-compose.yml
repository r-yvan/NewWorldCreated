version: "3.9"

services:
  # ===== Database =====
  postgres:
    image: postgres:16-alpine
    container_name: fems-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: r-yvan
      POSTGRES_PASSWORD: "Nry369&2008"
      POSTGRES_DB: fems-db
    ports:
      - "5432:5432"
    volumes:
      - fems_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U r-yvan -d fems-db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fems-network

  # ===== Microservices =====
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: fems-auth-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: postgresql://r-yvan:Nry369%262008@postgres:5432/fems-db
      JWT_SECRET: ${JWT_SECRET:-prod_access_secret_change_me}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-prod_refresh_secret_change_me}
      JWT_REFRESH_EXPIRES_IN: 7d
      RESET_TOKEN_EXPIRES_MIN: 30
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      AUTH_RATE_LIMIT_MAX: 10
      BCRYPT_SALT_ROUNDS: 12
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - fems-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: fems-user-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5002
      DATABASE_URL: postgresql://r-yvan:Nry369%262008@postgres:5432/fems-db
      JWT_SECRET: ${JWT_SECRET:-prod_access_secret_change_me}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-prod_refresh_secret_change_me}
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
      BCRYPT_SALT_ROUNDS: 12
    ports:
      - "5002:5002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - fems-network

  extinguisher-service:
    build:
      context: ./extinguisher-service
      dockerfile: Dockerfile
    container_name: fems-extinguisher-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5003
      DATABASE_URL: postgresql://r-yvan:Nry369%262008@postgres:5432/fems-db
      JWT_SECRET: ${JWT_SECRET:-prod_access_secret_change_me}
      JWT_EXPIRES_IN: 15m
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - "5003:5003"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - fems-network

  inspection-service:
    build:
      context: ./inspection-service
      dockerfile: Dockerfile
    container_name: fems-inspection-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5004
      DATABASE_URL: postgresql://r-yvan:Nry369%262008@postgres:5432/fems-db
      JWT_SECRET: ${JWT_SECRET:-prod_access_secret_change_me}
      JWT_EXPIRES_IN: 15m
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - "5004:5004"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - fems-network

  maintenance-service:
    build:
      context: ./maintenance-service
      dockerfile: Dockerfile
    container_name: fems-maintenance-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5005
      DATABASE_URL: postgresql://r-yvan:Nry369%262008@postgres:5432/fems-db
      JWT_SECRET: ${JWT_SECRET:-prod_access_secret_change_me}
      JWT_EXPIRES_IN: 15m
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - "5005:5005"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5005/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - fems-network

  reporting-service:
    build:
      context: ./reporting-service
      dockerfile: Dockerfile
    container_name: fems-reporting-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5006
      DATABASE_URL: postgresql://r-yvan:Nry369%262008@postgres:5432/fems-db
      JWT_SECRET: ${JWT_SECRET:-prod_access_secret_change_me}
      JWT_EXPIRES_IN: 15m
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info
      EXPORT_DIR: /app/tmp/exports
    ports:
      - "5006:5006"
    volumes:
      - fems_exports:/app/tmp/exports
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5006/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - fems-network

  # ===== API Gateway =====
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: fems-api-gateway
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      extinguisher-service:
        condition: service_healthy
      inspection-service:
        condition: service_healthy
      maintenance-service:
        condition: service_healthy
      reporting-service:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      CORS_ORIGIN: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      AUTH_SERVICE_URL: http://auth-service:5001
      USER_SERVICE_URL: http://user-service:5002
      EXTINGUISHER_SERVICE_URL: http://extinguisher-service:5003
      INSPECTION_SERVICE_URL: http://inspection-service:5004
      MAINTENANCE_SERVICE_URL: http://maintenance-service:5005
      REPORTING_SERVICE_URL: http://reporting-service:5006
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - fems-network

volumes:
  fems_pgdata:
  fems_exports:

networks:
  fems-network:
    driver: bridge
